# ─────────────────────────────────────────────────────────────
# GitHub Actions — piece-monnaie Streamlit
#
# Variables (Settings > Secrets and variables > Actions > Variables) :
#   DEPLOY_HOST   → IP ou hostname du serveur de prod  ← variable, pas secret !
#   DEPLOY_PATH   → chemin sur le serveur (ex: /opt/piece_monnaie)
#   DEPLOY_USER   → utilisateur SSH (ex: deploy)
#
# Secrets (Settings > Secrets and variables > Actions > Secrets) :
#   DEPLOY_KEY    → clé SSH privée (contenu complet, BEGIN ... END)
# ─────────────────────────────────────────────────────────────

name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # BUILD — construction et push vers GitHub Container Registry
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # DEPLOY — redéploiement SSH sur le serveur de production
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: http://${{ vars.DEPLOY_HOST }}:3039

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copier docker-compose.yml sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: ${{ vars.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}

            # Authentification au registry GitHub
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            # Pull de la nouvelle image et redémarrage
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} \
            IMAGE_NAME=ghcr.io/${{ github.repository }} \
              docker compose pull

            IMAGE_TAG=${{ needs.build.outputs.image_tag }} \
            IMAGE_NAME=ghcr.io/${{ github.repository }} \
              docker compose up -d --remove-orphans

            # Nettoyage des anciennes images
            docker image prune -f

            echo "Deploy OK — ${{ needs.build.outputs.image_tag }} déployée"