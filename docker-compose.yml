services:
  piece-monnaie:
    image: ${CI_REGISTRY_IMAGE:-piece-monnaie}:${IMAGE_TAG:-latest}
    container_name: piece-monnaie
    restart: unless-stopped
    ports:
      - "3039:3039"
    volumes:
      # Persistance des données CSV (modifications de collection)
      - ./data:/app/appStreamlit/data
    environment:
      - STREAMLIT_SERVER_PORT=3039
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3039/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
